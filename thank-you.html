<!DOCTYPE html>
<html lang="en">

<head>

    <title>Thank You | Otticode</title>
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .thanks-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--color-bg-dark-alt);
            padding: 120px 20px 80px;
        }
        .thanks-section .fa-stack {
            color: var(--color-accent-primary);
            margin-bottom: 8px;
        }
        .thanks-section h1 {
            color: var(--color-text-emphasis);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .thanks-section p {
            color: var(--color-text-muted);
            font-size: 1.1em;
            margin-bottom: 32px;
        }
        .thanks-section .btn-oc {
            display: inline-block;
        }
    </style>
</head>

<body>

    <a href="#main-content" class="skip-link">Skip to content</a>

    <nav id="mainNav" class="navbar navbar-expand-md fixed-top" aria-label="Main navigation">
        <div class="container">
            <a class="navbar-brand" href="/">Otticode</a>
        </div>
    </nav>

    <main id="main-content">
    <section class="thanks-section">
        <div class="container">
            <span class="fa-stack fa-4x" aria-hidden="true">
                <i class="fas fa-circle fa-stack-2x"></i>
                <i class="fas fa-check fa-stack-1x fa-inverse"></i>
            </span>
            <h1>Message received!</h1>
            <p>Thanks for reaching out. We'll get back to you shortly.</p>
            <a class="btn-oc page-scroll" href="/">Back to Home</a>
        </div>
    </section>
    </main>

    <footer class="text-center">
        <div class="container">
            <div class="footer-brand">Ōtticode</div>

            <p class="footer-copyright">

            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
